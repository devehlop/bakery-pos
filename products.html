<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кучтэнэч | Ассортимент</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="logo">
                <div class="logo-icon">🥐</div>
                <div class="logo-text">
                    <span class="logo-title">Кучтэнэч</span>
                    <span class="logo-subtitle">Аналитика</span>
                </div>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-item"><span class="nav-icon">📊</span><span>Дашборд</span></a>
                <a href="sales.html" class="nav-item"><span class="nav-icon">💰</span><span>Продажи</span></a>
                <a href="add-sale.html" class="nav-item"><span class="nav-icon">➕</span><span>Новая продажа</span></a>
                <a href="products.html" class="nav-item active"><span
                        class="nav-icon">🥧</span><span>Ассортимент</span></a>
                <a href="reports.html" class="nav-item"><span class="nav-icon">📄</span><span>Отчёты</span></a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">АК</div>
                    <div class="user-details">
                        <span class="user-name">Айгуль Каримова</span>
                        <span class="user-role">Владелец</span>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>

            <header class="header">
                <div class="header-left">
                    <h1 class="page-title">Ассортимент</h1>
                </div>
                <div class="header-right">
                    <button class="btn btn-secondary" id="addProductBtn">➕ Добавить товар</button>
                </div>
            </header>

            <div class="page-content">
                <!-- Фильтры -->
                <div class="filters-bar">
                    <div class="search-box">
                        <span class="search-icon">🔍</span>
                        <input type="text" placeholder="Поиск товара..." id="productSearch">
                    </div>
                    <div class="category-tabs">
                        <button class="tab-btn active" data-category="all">Все</button>
                        <button class="tab-btn" data-category="national">🥟 Национальное</button>
                        <button class="tab-btn" data-category="bread">🍞 Хлеб</button>
                        <button class="tab-btn" data-category="pastry">🥐 Выпечка</button>
                        <button class="tab-btn" data-category="drinks">☕ Напитки</button>
                    </div>
                </div>

                <!-- Таблица товаров -->
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Товар</th>
                                <th>Категория</th>
                                <th>Цена</th>
                                <th>Продано (месяц)</th>
                                <th>Выручка</th>
                                <th>Маржа</th>
                                <th>Тренд</th>
                            </tr>
                        </thead>
                        <tbody id="productsTableBody"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
    <script>
        initProductsPage();
    </script>
</body>

</html>
