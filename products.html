<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кучтэнэч | Ассортимент</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/styles.css">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar Container -->
        <div id="sidebar-container"></div>

        <main class="main-content">
            <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>

            <!-- Header Container -->
            <div id="header-container"></div>

            <div class="page-content">
                <!-- Фильтры -->
                <div class="filters-bar">
                    <div class="search-box">
                        <span class="search-icon">🔍</span>
                        <input type="text" placeholder="Поиск товара..." id="productSearch">
                    </div>
                    <div class="category-tabs">
                        <button class="tab-btn active" data-category="all">Все</button>
                        <button class="tab-btn" data-category="national">🥟 Национальное</button>
                        <button class="tab-btn" data-category="bread">🍞 Хлеб</button>
                        <button class="tab-btn" data-category="pastry">🥐 Выпечка</button>
                        <button class="tab-btn" data-category="drinks">☕ Напитки</button>
                    </div>
                </div>

                <!-- Таблица товаров -->
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Товар</th>
                                <th>Категория</th>
                                <th>Цена</th>
                                <th>Продано (месяц)</th>
                                <th>Выручка</th>
                                <th>Маржа</th>
                                <th>Тренд</th>
                            </tr>
                        </thead>
                        <tbody id="productsTableBody"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initProductsPage } from './src/app.js';
        document.addEventListener('DOMContentLoaded', () => initProductsPage());
    </script>
</body>

</html>
