<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ингредиенты | Кучтэнэч</title>
    <meta name="description" content="Управление ингредиентами пекарни Кучтэнэч">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/styles.css">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <!-- Sidebar Container -->
        <div id="sidebar-container"></div>

        <main class="main-content">
            <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>

            <!-- Header Container -->
            <div id="header-container"></div>

            <div class="dashboard-content">
                <!-- KPI Cards -->
                <div class="kpi-grid">
                    <div class="kpi-card">
                        <div class="kpi-icon" style="background: linear-gradient(135deg, #667eea, #764ba2);">📦</div>
                        <div class="kpi-info">
                            <span class="kpi-label">Всего ингредиентов</span>
                            <span class="kpi-value" id="totalIngredients">0</span>
                        </div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-icon" style="background: linear-gradient(135deg, #f093fb, #f5576c);">⚠️</div>
                        <div class="kpi-info">
                            <span class="kpi-label">Критические остатки</span>
                            <span class="kpi-value" id="lowStockCount">0</span>
                        </div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-icon" style="background: linear-gradient(135deg, #4facfe, #00f2fe);">💰</div>
                        <div class="kpi-info">
                            <span class="kpi-label">Стоимость запасов</span>
                            <span class="kpi-value" id="totalStockValue">0 ₽</span>
                        </div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-icon" style="background: linear-gradient(135deg, #43e97b, #38f9d7);">📊</div>
                        <div class="kpi-info">
                            <span class="kpi-label">Операций за месяц</span>
                            <span class="kpi-value" id="monthOperations">0</span>
                        </div>
                    </div>
                </div>

                <!-- Filters -->
                <div class="filters-section">
                    <div class="tabs">
                        <button class="tab-btn active" data-category="all" onclick="filterByCategory('all')">
                            Все
                        </button>
                        <button class="tab-btn" data-category="flour" onclick="filterByCategory('flour')">
                            Мука
                        </button>
                        <button class="tab-btn" data-category="dairy" onclick="filterByCategory('dairy')">
                            Молочка
                        </button>
                        <button class="tab-btn" data-category="meat" onclick="filterByCategory('meat')">
                            Мясо
                        </button>
                        <button class="tab-btn" data-category="vegetables" onclick="filterByCategory('vegetables')">
                            Овощи
                        </button>
                        <button class="tab-btn" data-category="other" onclick="filterByCategory('other')">
                            Прочее
                        </button>
                    </div>
                    <div class="search-box">
                        <input type="text" id="ingredientSearch" placeholder="🔍 Поиск ингредиентов..."
                            oninput="handleSearch()">
                    </div>
                </div>

                <!-- Table -->
                <div class="card">
                    <div class="table-container">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Статус</th>
                                    <th>Название</th>
                                    <th>Категория</th>
                                    <th>Остаток</th>
                                    <th>Мин. остаток</th>
                                    <th>Цена закупки</th>
                                    <th>Стоимость</th>
                                    <th>Поставщик</th>
                                    <th>Действия</th>
                                </tr>
                            </thead>
                            <tbody id="ingredientsTableBody">
                                <!-- Заполняется через JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal: Add Ingredient -->
    <div id="addIngredientModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>➕ Добавить ингредиент</h2>
                <button class="modal-close" onclick="closeAddIngredientModal()">✕</button>
            </div>
            <form id="addIngredientForm" onsubmit="handleAddIngredient(event)">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="addName">Название *</label>
                        <input type="text" id="addName" required>
                    </div>
                    <div class="form-group">
                        <label for="addCategory">Категория *</label>
                        <select id="addCategory" required>
                            <option value="">Выберите...</option>
                            <option value="flour">Мука</option>
                            <option value="dairy">Молочные продукты</option>
                            <option value="eggs">Яйца</option>
                            <option value="meat">Мясо</option>
                            <option value="vegetables">Овощи</option>
                            <option value="sugar">Сахар и мёд</option>
                            <option value="other">Прочее</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="addUnit">Единица измерения *</label>
                        <select id="addUnit" required>
                            <option value="кг">кг</option>
                            <option value="л">л</option>
                            <option value="шт">шт</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="addPurchasePrice">Цена закупки (₽) *</label>
                        <input type="number" id="addPurchasePrice" step="0.01" min="0" required>
                    </div>
                    <div class="form-group">
                        <label for="addCurrentStock">Текущий остаток *</label>
                        <input type="number" id="addCurrentStock" step="0.01" min="0" required>
                    </div>
                    <div class="form-group">
                        <label for="addMinStock">Минимальный остаток *</label>
                        <input type="number" id="addMinStock" step="0.01" min="0" required>
                    </div>
                    <div class="form-group full-width">
                        <label for="addSupplier">Поставщик</label>
                        <input type="text" id="addSupplier">
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeAddIngredientModal()">
                        Отмена
                    </button>
                    <button type="submit" class="btn btn-primary">
                        Сохранить
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal: Edit Ingredient -->
    <div id="editIngredientModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>✏️ Редактировать ингредиент</h2>
                <button class="modal-close" onclick="closeEditIngredientModal()">✕</button>
            </div>
            <form id="editIngredientForm" onsubmit="handleEditIngredient(event)">
                <input type="hidden" id="editId">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="editName">Название *</label>
                        <input type="text" id="editName" required>
                    </div>
                    <div class="form-group">
                        <label for="editCategory">Категория *</label>
                        <select id="editCategory" required>
                            <option value="flour">Мука</option>
                            <option value="dairy">Молочные продукты</option>
                            <option value="eggs">Яйца</option>
                            <option value="meat">Мясо</option>
                            <option value="vegetables">Овощи</option>
                            <option value="sugar">Сахар и мёд</option>
                            <option value="other">Прочее</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="editUnit">Единица измерения *</label>
                        <select id="editUnit" required>
                            <option value="кг">кг</option>
                            <option value="л">л</option>
                            <option value="шт">шт</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="editPurchasePrice">Цена закупки (₽) *</label>
                        <input type="number" id="editPurchasePrice" step="0.01" min="0" required>
                    </div>
                    <div class="form-group">
                        <label for="editCurrentStock">Текущий остаток *</label>
                        <input type="number" id="editCurrentStock" step="0.01" min="0" required>
                    </div>
                    <div class="form-group">
                        <label for="editMinStock">Минимальный остаток *</label>
                        <input type="number" id="editMinStock" step="0.01" min="0" required>
                    </div>
                    <div class="form-group full-width">
                        <label for="editSupplier">Поставщик</label>
                        <input type="text" id="editSupplier">
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeEditIngredientModal()">
                        Отмена
                    </button>
                    <button type="submit" class="btn btn-primary">
                        Сохранить изменения
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initIngredientsPage } from './src/ingredients-page.js';
        document.addEventListener('DOMContentLoaded', () => initIngredientsPage());
    </script>
</body>

</html>
